# Reverse proxy that fronts the whole stack on a single origin.
#
# Serving the OHIF SPA and the API from the same origin means the dental API
# client's same-origin "/api" fallback (see Viewers/extensions/dental/src/dentalApi.ts)
# works with no build-time configuration, and there are no cross-origin/CORS concerns.
server {
    listen 80;
    server_name _;

    # API -> Node backend
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else -> OHIF static app
    location / {
        proxy_pass         http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
